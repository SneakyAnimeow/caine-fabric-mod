name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine release tag
        id: tag
        run: |
          # %-m / %-d strips leading zeros; this requires GNU date (available on ubuntu-latest)
          DATE=$(date -u '+%Y.%-m.%-d')
          BASE_TAG="v${DATE}"

          # Find how many tags already exist for today
          EXISTING=$(git tag --list "${BASE_TAG}" "${BASE_TAG}-rev*" | wc -l | tr -d ' ')

          if [ "$EXISTING" -eq 0 ]; then
            TAG="${BASE_TAG}"
          else
            # revision index starts at 1 for the second release of the day
            REV=$EXISTING
            TAG="${BASE_TAG}-rev${REV}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Collect artifacts
        id: artifacts
        run: |
          # Exclude sources and dev jars, keep only the primary mod jar
          JAR=$(find build/libs -name "*.jar" ! -name "*-sources.jar" ! -name "*-dev.jar" | head -1)
          if [ -z "$JAR" ]; then
            echo "Error: no mod JAR found in build/libs" >&2
            exit 1
          fi
          echo "jar=${JAR}" >> "$GITHUB_OUTPUT"
          echo "Artifact: ${JAR}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: ${{ steps.artifacts.outputs.jar }}
          generate_release_notes: true
